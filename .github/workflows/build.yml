name: Build iOS IPA Without Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          xcodebuild -project *.xcodeproj -scheme "*" -configuration Release archive -archivePath build/app.xcarchive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive -archivePath build/app.xcarchive -exportPath build/ipa -exportOptionsPlist <(echo '{"method":"ad-hoc","signingStyle":"automatic"}')

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-IPA
          path: build/ipa/*.ipa
