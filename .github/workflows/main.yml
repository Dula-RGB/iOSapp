name: Build iOS IPA

# 触发条件：当你推送到 main 分支时自动运行
on:
  push:
    branches: [ main ]

jobs:
  build:
    # 使用 macOS 环境编译 Xcode 项目
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Xcode 版本（这里用最新稳定版）
        run: echo "DEVELOPER_DIR=/Applications/Xcode_15.4.app/Contents/Developer" >> $GITHUB_ENV

      - name: 编译并归档项目
        run: |
          # 注意：把这里的 你的项目名.xcodeproj 和 你的Scheme名 改成你自己的
          xcodebuild -project 你的项目名.xcodeproj \
            -scheme "你的Scheme名" \
            -configuration Release \
            clean archive \
            -archivePath build/App.xcarchive

      - name: 导出 IPA 安装包
        run: |
          # 注意：如果你的项目用了 .xcworkspace，需要改成对应的导出配置
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/IPA \
            -exportOptionsPlist ExportOptions.plist

      - name: 上传 IPA 到构建产物
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-IPA
          path: build/IPA/*.ipaname: Build iOS IPA

